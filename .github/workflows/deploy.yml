name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Verifique se sua branch principal é 'main' ou 'master'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Criar config.js com Segredos
        run: |
          echo "const AppConfig = {" > config.js
          echo "    API_URL: '${{ secrets.SHEETDB_API_URL }}'," >> config.js
          echo "    CSV_REFERENCE_URL: 'dados_transacoes_entrada_manual - referencia_servicos.csv'" >> config.js
          echo "};" >> config.js

      # Passo NOVO: Remove o config.js do .gitignore para permitir que ele seja publicado
      - name: Permitir upload do config.js
        run: sed -i '/config.js/d' .gitignore || true

      - name: Deploy para GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . 
          branch: gh-pages
          clean: true
          force: true
